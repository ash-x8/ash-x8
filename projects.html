<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services | ASH_X8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#050505] text-white antialiased overflow-x-hidden">

    <div class="animation-bg-wrapper">
        <canvas id="particles-canvas"></canvas>
    </div>

    <header class="fixed top-4 left-1/2 -translate-x-1/2 w-[92%] max-w-7xl z-50 bg-black/10 rounded-3xl border border-white/[0.05] backdrop-blur-xl shadow-2xl">
        <div class="px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="text-xl font-black tracking-widest uppercase font-['Orbitron'] text-cyan-400">ASH_X8</a>
            <nav id="desktop-menu" class="hidden md:flex items-center space-x-6 bg-white/[0.02] px-6 py-2 rounded-full border border-white/[0.05]"></nav>
            <button onclick="toggleMenu()" class="md:hidden text-white text-2xl"><i class="fa-solid fa-bars-staggered"></i></button>
        </div>
        <div id="mobile-drawer" class="hidden fixed top-24 left-0 w-full bg-black/95 backdrop-blur-2xl p-6 flex flex-col space-y-4 rounded-b-3xl"></div>
    </header>

    <section class="min-h-screen pt-36 pb-20 px-6 max-w-7xl mx-auto relative z-10">
        <div class="text-center mb-16">
            <h2 class="text-xs uppercase tracking-widest text-cyan-400 mb-3 font-bold font-['Orbitron']">Expertise Portfolio</h2>
            <h3 class="text-4xl md:text-5xl font-extrabold uppercase tracking-tight font-['Orbitron']">Services Grid</h3>
        </div>
        <div id="services-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </section>

    <script src="config.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const data = window.SITE_CONFIG;
            
            const desk = document.getElementById("desktop-menu");
            const mob = document.getElementById("mobile-drawer");
            data.nav.links.forEach(l => {
                const act = l.href === "services.html" ? "text-cyan-400 font-bold" : "text-gray-400";
                desk.innerHTML += `<a href="${l.href}" class="text-xs uppercase tracking-widest font-medium transition-all ${act}">${l.text}</a>`;
                mob.innerHTML += `<a href="${l.href}" class="text-lg ${act}">${l.text}</a>`;
            });

            const grid = document.getElementById("services-grid");
            data.services.forEach(s => {
                let dHTML = `<ul class="space-y-3 mt-6 text-sm text-gray-400">`;
                s.details.forEach(d => { dHTML += `<li class="flex items-start gap-2"><span class="text-cyan-400">✦</span><span>${d}</span></li>`; });
                dHTML += `</ul>`;

                grid.innerHTML += `
                    <div class="bg-white/[0.01] border border-white/[0.06] p-8 rounded-[2rem] backdrop-blur-xl hover:border-cyan-500/30 transition-all duration-500 shadow-xl">
                        <div class="text-4xl w-16 h-16 bg-white/[0.03] border border-white/[0.05] rounded-2xl flex items-center justify-center mb-6">${s.icon}</div>
                        <h4 class="text-xl font-bold mb-2 font-['Orbitron']">${s.title}</h4>
                        <p class="text-xs text-gray-500 uppercase tracking-wider mb-4 font-['Orbitron']">${s.shortDesc}</p>
                        <div class="border-t border-white/[0.05] pt-4">${dHTML}</div>
                    </div>
                `;
            });
        });

        window.toggleMenu = () => document.getElementById("mobile-drawer").classList.toggle("hidden");
    </script>
</body>
</html>
