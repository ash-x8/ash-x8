<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designs | ASH_X8 Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
    <style>
        body { background:linear-gradient(135deg,#030d1a 0%,#071428 50%,#050e24 100%); background-attachment:fixed; color:#f0f8ff; }

        .page-hero { padding:8rem 2rem 3rem; text-align:center; position:relative; overflow:hidden; }
        .page-hero::before { content:''; position:absolute; width:700px; height:400px; background:radial-gradient(ellipse,rgba(14,165,233,.07) 0%,transparent 70%); top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
        .page-eyebrow { font-family:'JetBrains Mono',monospace; font-size:.72rem; letter-spacing:.3em; text-transform:uppercase; color:#06b6d4; margin-bottom:1.2rem; opacity:0; animation:fadeInUp .6s ease-out .2s forwards; display:block; }
        .page-title { font-family:'Orbitron',sans-serif; font-size:clamp(2.2rem,6vw,4rem); font-weight:900; letter-spacing:.06em; text-transform:uppercase; background:linear-gradient(135deg,#0ea5e9,#06b6d4,#38bdf8); background-size:200% 200%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:textGlitch 5s ease-in-out infinite,gradientFlow 6s ease infinite; margin-bottom:1rem; }
        .page-sub { font-family:'Rajdhani',sans-serif; font-size:1.1rem; letter-spacing:.15em; text-transform:uppercase; color:#64748b; opacity:0; animation:fadeInUp .6s ease-out .5s forwards; }

        /* Filters */
        .filter-bar { display:flex; gap:.6rem; flex-wrap:wrap; justify-content:center; margin-bottom:3rem; }
        .filter-btn { padding:.45rem 1.1rem; background:rgba(14,165,233,.08); border:1.5px solid rgba(14,165,233,.2); border-radius:2rem; font-family:'JetBrains Mono',monospace; font-size:.65rem; letter-spacing:.12em; text-transform:uppercase; color:#64748b; cursor:pointer; transition:all .3s cubic-bezier(.34,1.56,.64,1); }
        .filter-btn:hover { background:rgba(14,165,233,.15); border-color:rgba(14,165,233,.45); color:#0ea5e9; transform:translateY(-2px); }
        .filter-btn.active { background:linear-gradient(135deg,#0ea5e9,#06b6d4); border-color:#0ea5e9; color:#fff; font-weight:700; box-shadow:0 0 20px rgba(14,165,233,.4); }

        /* Grid - cards layout for designs */
        .design-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1.5rem; max-width:1300px; margin:0 auto; padding:0 2rem 5rem; }
        @media(max-width:640px) { .design-grid { grid-template-columns:1fr; } }

        .design-card { background:linear-gradient(135deg,rgba(5,15,38,.7),rgba(8,22,50,.7)); border:1.5px solid rgba(14,165,233,.15); border-radius:1.2rem; overflow:hidden; cursor:pointer; transition:all .4s cubic-bezier(.34,1.56,.64,1); position:relative; }
        .design-card::after { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(14,165,233,.7),rgba(6,182,212,.4),transparent); opacity:0; transition:opacity .4s; }
        .design-card:hover::after { opacity:1; }
        .design-card:hover { border-color:rgba(14,165,233,.55); box-shadow:0 0 40px rgba(14,165,233,.25),0 20px 60px rgba(0,0,0,.4); transform:translateY(-8px); }
        .design-img-wrap { aspect-ratio:16/9; overflow:hidden; position:relative; }
        .design-img-wrap img { width:100%; height:100%; object-fit:cover; transition:transform .6s ease; }
        .design-card:hover .design-img-wrap img { transform:scale(1.08); }
        .design-img-placeholder { width:100%; height:100%; background:linear-gradient(135deg,rgba(14,165,233,.08),rgba(6,182,212,.05)); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.5rem; }
        .design-img-placeholder i { font-size:2.5rem; color:rgba(14,165,233,.3); }

        .design-info { padding:1.5rem; }
        .design-cat { font-family:'JetBrains Mono',monospace; font-size:.62rem; letter-spacing:.15em; text-transform:uppercase; color:#06b6d4; margin-bottom:.5rem; display:inline-flex; align-items:center; gap:.4rem; }
        .design-title { font-family:'Rajdhani',sans-serif; font-size:1.25rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#f0f8ff; margin-bottom:.5rem; }
        .design-date  { font-family:'JetBrains Mono',monospace; font-size:.6rem; letter-spacing:.1em; color:#4a5568; margin-bottom:.6rem; }
        .design-desc  { font-family:'Plus Jakarta Sans',sans-serif; color:#94a3b8; font-size:.85rem; line-height:1.65; margin-bottom:1rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .design-view  { font-family:'Rajdhani',sans-serif; font-size:.8rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:#0ea5e9; display:flex; align-items:center; gap:.5rem; transition:gap .3s; }
        .design-card:hover .design-view { gap:.8rem; }

        /* Category badge */
        .cat-badge { display:inline-flex; align-items:center; gap:.35rem; padding:.25rem .65rem; border-radius:2rem; border:1px solid rgba(14,165,233,.25); background:rgba(14,165,233,.08); font-family:'JetBrains Mono',monospace; font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:#0ea5e9; }

        /* Empty State */
        .empty-state { text-align:center; padding:5rem 2rem; grid-column:1/-1; }
        .empty-state .empty-icon { font-size:4rem; color:rgba(14,165,233,.2); margin-bottom:1.5rem; }
        .empty-state h3 { font-family:'Rajdhani',sans-serif; font-size:1.5rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#0ea5e9; margin-bottom:.8rem; }
        .empty-state p { font-family:'JetBrains Mono',monospace; font-size:.72rem; letter-spacing:.1em; color:#4a5568; line-height:1.7; }

        /* Lightbox */
        .lightbox { display:none; position:fixed; inset:0; z-index:9000; background:rgba(3,13,26,.97); backdrop-filter:blur(20px); align-items:center; justify-content:center; padding:2rem; }
        .lightbox.open { display:flex; animation:fadeInScale .3s ease-out; }
        .lb-content { max-width:900px; width:100%; position:relative; }
        .lb-img-wrap { border-radius:1rem; overflow:hidden; border:1.5px solid rgba(14,165,233,.25); box-shadow:0 0 60px rgba(14,165,233,.2); }
        .lb-img-wrap img { width:100%; max-height:65vh; object-fit:contain; background:#040e20; }
        .lb-info { padding:1.2rem 0 0; }
        .lb-cat   { font-family:'JetBrains Mono',monospace; font-size:.62rem; letter-spacing:.15em; text-transform:uppercase; color:#06b6d4; margin-bottom:.4rem; }
        .lb-title { font-family:'Orbitron',sans-serif; font-size:1.2rem; font-weight:900; letter-spacing:.06em; text-transform:uppercase; background:linear-gradient(135deg,#0ea5e9,#06b6d4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:.3rem; }
        .lb-date  { font-family:'JetBrains Mono',monospace; font-size:.62rem; letter-spacing:.1em; color:#4a5568; margin-bottom:.6rem; }
        .lb-desc  { font-family:'Plus Jakarta Sans',sans-serif; color:#94a3b8; font-size:.9rem; line-height:1.7; }
        .lb-close { position:absolute; top:-1rem; right:-1rem; width:40px; height:40px; border-radius:50%; background:rgba(14,165,233,.15); border:1.5px solid rgba(14,165,233,.3); color:#0ea5e9; font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .3s; }
        .lb-close:hover { background:rgba(14,165,233,.3); transform:rotate(90deg) scale(1.1); }
        .lb-nav { display:flex; gap:1rem; margin-top:1rem; }
        .lb-nav-btn { flex:1; padding:.7rem; background:rgba(14,165,233,.08); border:1.5px solid rgba(14,165,233,.2); border-radius:.6rem; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.8rem; letter-spacing:.1em; text-transform:uppercase; color:#0ea5e9; cursor:pointer; transition:all .3s; }
        .lb-nav-btn:hover { background:rgba(14,165,233,.15); border-color:#0ea5e9; box-shadow:0 0 20px rgba(14,165,233,.3); }
        .lb-nav-btn:disabled { opacity:.2; cursor:not-allowed; }

        .social-links-container { display:flex; gap:.7rem; flex-wrap:wrap; }
        .social-link-btn { display:inline-flex; align-items:center; justify-content:center; width:42px; height:42px; border-radius:.6rem; border:1.5px solid rgba(255,255,255,.08); background:rgba(255,255,255,.04); color:var(--sc,#fff); font-size:1.1rem; text-decoration:none; transition:all .3s cubic-bezier(.34,1.56,.64,1); }
        .social-link-btn:hover { background:rgba(255,255,255,.08); border-color:var(--sc,#0ea5e9); transform:translateY(-4px) scale(1.1); }
    </style>
</head>
<body>
    <!-- Nav -->
    <nav class="fixed top-4 left-1/2 -translate-x-1/2 w-[95%] max-w-7xl z-50 bg-black/20 rounded-xl border border-sky-500/20 backdrop-blur-xl shadow-2xl">
        <div class="px-5 py-3 flex items-center justify-between gap-2">
            <a href="/" id="nav-brand" style="font-family:'Orbitron',sans-serif;font-weight:900;font-size:1rem;letter-spacing:.12em;text-transform:uppercase;background:linear-gradient(135deg,#0ea5e9,#06b6d4,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:textGlitch 5s infinite;white-space:nowrap;">ASH_X8</a>
            <div class="flex gap-1 overflow-x-auto">
                <a href="/" class="px-3 py-2 text-xs font-bold tracking-widest uppercase rounded-lg text-gray-400 hover:text-sky-400 hover:bg-sky-500/10 transition-all whitespace-nowrap" style="font-family:'Rajdhani',sans-serif;">Home</a>
                <a href="/about.html" class="px-3 py-2 text-xs font-bold tracking-widest uppercase rounded-lg text-gray-400 hover:text-sky-400 hover:bg-sky-500/10 transition-all whitespace-nowrap" style="font-family:'Rajdhani',sans-serif;">About</a>
                <a href="/photography.html" class="px-3 py-2 text-xs font-bold tracking-widest uppercase rounded-lg text-gray-400 hover:text-sky-400 hover:bg-sky-500/10 transition-all whitespace-nowrap" style="font-family:'Rajdhani',sans-serif;">Photography</a>
                <a href="/designs.html" class="px-3 py-2 text-xs font-bold tracking-widest uppercase rounded-lg text-sky-400 bg-sky-500/10 border border-sky-500/20 whitespace-nowrap" style="font-family:'Rajdhani',sans-serif;">Designs</a>
                <a href="/projects.html" class="px-3 py-2 text-xs font-bold tracking-widest uppercase rounded-lg text-gray-400 hover:text-sky-400 hover:bg-sky-500/10 transition-all whitespace-nowrap" style="font-family:'Rajdhani',sans-serif;">Services</a>
            </div>
        </div>
    </nav>

    <div class="page-hero">
        <span class="page-eyebrow">// Creative Work &nbsp;◈&nbsp; Design Portfolio</span>
        <h1 class="page-title" id="page-title"></h1>
        <p class="page-sub">Graphic Design &nbsp;·&nbsp; Brand Identity &nbsp;·&nbsp; Visual Concepts</p>
    </div>

    <div class="filter-bar px-4" id="filter-bar" style="max-width:1300px;margin:0 auto 2rem;">
        <button class="filter-btn active" data-filter="all" onclick="filterDesigns('all',this)">All</button>
    </div>

    <div class="design-grid" id="design-grid">
        <div class="empty-state">
            <div class="empty-icon"><i class="fas fa-palette"></i></div>
            <h3>No Designs Yet</h3>
            <p>// Add design projects through the Admin panel → Designs tab.</p>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <div class="lb-content">
            <button class="lb-close" onclick="closeLightbox()"><i class="fas fa-xmark"></i></button>
            <div class="lb-img-wrap"><img id="lb-img" src="" alt=""></div>
            <div class="lb-info">
                <div class="lb-cat" id="lb-cat"></div>
                <div class="lb-title" id="lb-title"></div>
                <div class="lb-date"  id="lb-date"></div>
                <div class="lb-desc"  id="lb-desc"></div>
                <div class="lb-nav">
                    <button class="lb-nav-btn" id="lb-prev" onclick="lbNav(-1)"><i class="fas fa-arrow-left mr-1"></i> Prev</button>
                    <button class="lb-nav-btn" id="lb-next" onclick="lbNav(1)">Next <i class="fas fa-arrow-right ml-1"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="border-t py-10 px-4 text-center relative z-1" style="border-color:rgba(14,165,233,.15);">
        <div class="social-links-container" style="justify-content:center;margin-bottom:1.5rem;" id="footer-social"></div>
        <p style="font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.15em;color:#475569;text-transform:uppercase;">
            &copy; 2026 &nbsp;/&nbsp; <span style="color:#0ea5e9;" id="footer-name">Kushan A Wickramasinghe</span> &nbsp;/&nbsp; All Rights Reserved
        </p>
    </footer>

    <script src="site-data.js"></script>
    <script>
        let allItems = [];
        let filteredItems = [];
        let currentLbIdx = 0;

        window.addEventListener('DOMContentLoaded', () => {
            const d = SiteData.get();
            document.getElementById('nav-brand').textContent = d.profile.nickname || 'ASH_X8';
            document.getElementById('footer-name').textContent = d.profile.fullName;
            document.getElementById('footer-social').innerHTML = SiteData._buildSocialLinks(d.social);
            SiteData._buildSplitText(document.getElementById('page-title'), 'Designs');

            allItems = d.designs || [];
            filteredItems = [...allItems];
            buildFilters();
            renderGrid(filteredItems);
        });

        function buildFilters() {
            const cats = new Set(['all']);
            allItems.forEach(i => { if (i.category) cats.add(i.category); });
            const bar = document.getElementById('filter-bar');
            bar.innerHTML = '';
            cats.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn' + (cat === 'all' ? ' active' : '');
                btn.dataset.filter = cat;
                btn.textContent = cat === 'all' ? 'All' : cat;
                btn.onclick = function() { filterDesigns(cat, this); };
                bar.appendChild(btn);
            });
        }

        function filterDesigns(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            filteredItems = cat === 'all' ? [...allItems] : allItems.filter(i => i.category === cat);
            renderGrid(filteredItems);
        }

        function renderGrid(items) {
            const grid = document.getElementById('design-grid');
            if (!items.length) {
                grid.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-palette"></i></div><h3>No Designs Yet</h3><p>// Add design projects through the Admin panel → Designs tab.</p></div>`;
                return;
            }
            grid.innerHTML = items.map((item) => `
                <div class="design-card reveal-scale" onclick="openLightbox(${allItems.indexOf(item)})">
                    <div class="design-img-wrap">
                        ${item.imageUrl
                            ? `<img src="${item.imageUrl}" alt="${item.title}" loading="lazy">`
                            : `<div class="design-img-placeholder"><i class="fas fa-palette"></i><span style="font-family:'JetBrains Mono',monospace;font-size:.6rem;color:rgba(14,165,233,.4);">// DESIGN</span></div>`
                        }
                    </div>
                    <div class="design-info">
                        ${item.category ? `<div class="design-cat"><i class="fas fa-tag" style="font-size:.55rem;"></i> ${item.category}</div>` : ''}
                        <div class="design-title">${item.title}</div>
                        <div class="design-date">// ${item.date}</div>
                        <div class="design-desc">${item.description || ''}</div>
                        <div class="design-view"><i class="fas fa-arrow-right" style="font-size:.75rem;"></i> View Project</div>
                    </div>
                </div>
            `).join('');

            const ob = new IntersectionObserver(entries => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('revealed'); ob.unobserve(e.target); } });
            }, { threshold: 0.08 });
            document.querySelectorAll('.reveal-scale').forEach(el => ob.observe(el));
        }

        function openLightbox(idx) {
            currentLbIdx = idx;
            updateLightbox(idx);
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function updateLightbox(idx) {
            const item = allItems[idx];
            if (!item) return;
            document.getElementById('lb-img').src    = item.imageUrl || '';
            document.getElementById('lb-cat').textContent   = item.category ? '// ' + item.category : '';
            document.getElementById('lb-title').textContent = item.title;
            document.getElementById('lb-date').textContent  = '// ' + item.date;
            document.getElementById('lb-desc').textContent  = item.description || '';
            document.getElementById('lb-prev').disabled = idx === 0;
            document.getElementById('lb-next').disabled = idx === allItems.length - 1;
        }

        function lbNav(dir) {
            const newIdx = currentLbIdx + dir;
            if (newIdx >= 0 && newIdx < allItems.length) { currentLbIdx = newIdx; updateLightbox(newIdx); }
        }

        function closeLightbox(e) {
            if (!e || e.target === document.getElementById('lightbox') || e.target.classList.contains('lb-close') || e.target.closest('.lb-close')) {
                document.getElementById('lightbox').classList.remove('open');
                document.body.style.overflow = '';
            }
        }
        document.addEventListener('keydown', e => {
            if (!document.getElementById('lightbox').classList.contains('open')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') lbNav(-1);
            if (e.key === 'ArrowRight') lbNav(1);
        });
    </script>
</body>
</html>
