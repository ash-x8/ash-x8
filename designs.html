<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designs | ASH_X8 Portfolio</title>
    <script src="theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
    <style>
        body{background:linear-gradient(135deg,#030d1a 0%,#071428 50%,#050e24 100%);background-attachment:fixed;color:#f0f8ff;}
        .page-hero{padding:7.5rem 2rem 3rem;text-align:center;position:relative;overflow:hidden;}
        .page-hero::before{content:'';position:absolute;width:700px;height:400px;background:radial-gradient(ellipse,color-mix(in srgb,var(--primary) 7%,transparent) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
        .page-eyebrow{font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;color:var(--secondary);margin-bottom:1.2rem;opacity:0;animation:fadeInUp .6s ease-out .2s forwards;display:block;}
        .page-title{font-family:'Orbitron',sans-serif;font-size:clamp(2.2rem,6vw,4rem);font-weight:900;letter-spacing:.06em;text-transform:uppercase;background:linear-gradient(135deg,var(--primary),var(--secondary),var(--accent));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:textGlitch 5s ease-in-out infinite,gradientFlow 6s ease infinite;margin-bottom:1rem;}
        .page-sub{font-family:'Rajdhani',sans-serif;font-size:1.1rem;letter-spacing:.15em;text-transform:uppercase;color:#64748b;opacity:0;animation:fadeInUp .6s ease-out .5s forwards;}
        .filter-bar{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;margin:0 auto 2.5rem;max-width:1300px;padding:0 2rem;}
        .filter-btn{padding:.45rem 1.1rem;background:color-mix(in srgb,var(--primary) 8%,transparent);border:1.5px solid color-mix(in srgb,var(--primary) 20%,transparent);border-radius:2rem;font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:#64748b;cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);}
        .filter-btn:hover{background:color-mix(in srgb,var(--primary) 15%,transparent);border-color:color-mix(in srgb,var(--primary) 45%,transparent);color:var(--primary);transform:translateY(-2px);}
        .filter-btn.active{background:linear-gradient(135deg,var(--primary),var(--secondary));border-color:var(--primary);color:#fff;font-weight:700;box-shadow:0 0 20px color-mix(in srgb,var(--primary) 40%,transparent);}
        .designs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.6rem;max-width:1300px;margin:0 auto;padding:0 2rem 5rem;}
        .design-card{background:linear-gradient(135deg,rgba(5,15,38,.7),rgba(8,22,50,.7));border:1.5px solid color-mix(in srgb,var(--primary) 12%,transparent);border-radius:1.2rem;overflow:hidden;cursor:pointer;transition:all .4s cubic-bezier(.34,1.56,.64,1);position:relative;}
        .design-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--primary),var(--secondary),transparent);opacity:0;transition:opacity .4s;}
        .design-card:hover::after{opacity:1;}
        .design-card:hover{border-color:color-mix(in srgb,var(--primary) 50%,transparent);box-shadow:0 0 40px color-mix(in srgb,var(--primary) 25%,transparent),0 20px 60px rgba(0,0,0,.4);transform:translateY(-8px);}
        .design-img-wrap{width:100%;aspect-ratio:16/9;overflow:hidden;background:color-mix(in srgb,var(--primary) 5%,transparent);}
        .design-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease;}
        .design-card:hover .design-img-wrap img{transform:scale(1.06);}
        .design-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;color:color-mix(in srgb,var(--primary) 20%,transparent);}
        .design-info{padding:1.5rem;}
        .design-cat{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--secondary);margin-bottom:.5rem;}
        .design-title{font-family:'Rajdhani',sans-serif;font-size:1.25rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#f0f8ff;margin-bottom:.4rem;}
        .design-desc{font-family:'Plus Jakarta Sans',sans-serif;color:#64748b;font-size:.85rem;line-height:1.6;}
        .empty-state{text-align:center;padding:5rem 2rem;max-width:500px;margin:0 auto;grid-column:1/-1;}
        .empty-state .empty-icon{font-size:4rem;color:color-mix(in srgb,var(--primary) 20%,transparent);margin-bottom:1.5rem;}
        .empty-state h3{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--primary);margin-bottom:.8rem;}
        .empty-state p{font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.1em;color:#4a5568;line-height:1.7;}
        .lightbox{display:none;position:fixed;inset:0;z-index:9000;background:rgba(3,13,26,.97);backdrop-filter:blur(20px);align-items:center;justify-content:center;padding:2rem;}
        .lightbox.open{display:flex;animation:fadeInScale .3s ease-out;}
        .lb-content{max-width:960px;width:100%;position:relative;}
        .lb-img-wrap{border-radius:1rem;overflow:hidden;border:1.5px solid color-mix(in srgb,var(--primary) 25%,transparent);box-shadow:0 0 60px color-mix(in srgb,var(--primary) 20%,transparent);}
        .lb-img-wrap img{width:100%;max-height:65vh;object-fit:contain;background:#040e20;}
        .lb-info{padding:1.5rem 0 0;display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:start;}
        .lb-cat{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--secondary);margin-bottom:.3rem;}
        .lb-title{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.3rem;}
        .lb-desc{font-family:'Plus Jakarta Sans',sans-serif;color:#94a3b8;font-size:.88rem;line-height:1.7;}
        .lb-close{width:40px;height:40px;border-radius:50%;background:color-mix(in srgb,var(--primary) 15%,transparent);border:1.5px solid color-mix(in srgb,var(--primary) 30%,transparent);color:var(--primary);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0;}
        .lb-close:hover{background:color-mix(in srgb,var(--primary) 30%,transparent);transform:rotate(90deg) scale(1.1);}
        .lb-nav{display:flex;gap:1rem;margin-top:1rem;grid-column:1/-1;}
        .lb-nav-btn{flex:1;padding:.7rem;background:color-mix(in srgb,var(--primary) 8%,transparent);border:1.5px solid color-mix(in srgb,var(--primary) 20%,transparent);border-radius:.6rem;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--primary);cursor:pointer;transition:all .3s;}
        .lb-nav-btn:hover{background:color-mix(in srgb,var(--primary) 15%,transparent);border-color:var(--primary);}
        .lb-nav-btn:disabled{opacity:.2;cursor:not-allowed;transform:none;}
    </style>
</head>
<body>
    <nav class="site-nav">
        <div class="nav-inner">
            <a href="/" class="nav-brand"><span id="nav-brand-name">ASH_X8</span><span class="nav-brand-sub">Creative Studio</span></a>
            <div class="nav-links" id="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/about.html" class="nav-link">About</a>
                <a href="/photography.html" class="nav-link">Photography</a>
                <a href="/designs.html" class="nav-link active">Designs</a>
                <a href="/projects.html" class="nav-link">Services</a>
            </div>
            <button class="nav-ham" id="nav-ham" aria-label="Menu"><span></span><span></span><span></span></button>
        </div>
        <div class="nav-bottom-line"></div>
    </nav>
    <div class="page-hero">
        <span class="page-eyebrow">// Creative Work &nbsp;◈&nbsp; Design Portfolio</span>
        <h1 class="page-title" id="page-title"></h1>
        <p class="page-sub">Graphic Design &nbsp;·&nbsp; Brand Identity &nbsp;·&nbsp; Visual Concepts</p>
    </div>
    <div class="filter-bar" id="filter-bar"><button class="filter-btn active" onclick="filterDesigns('all',this)">All</button></div>
    <div class="designs-grid" id="designs-grid">
        <div class="empty-state"><div class="empty-icon"><i class="fas fa-palette"></i></div><h3>No Designs Yet</h3><p>// Add design projects through the Admin panel → Designs tab.</p></div>
    </div>
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <div class="lb-content">
            <div class="lb-img-wrap"><img id="lb-img" src="" alt=""></div>
            <div class="lb-info">
                <div><div class="lb-cat" id="lb-cat"></div><div class="lb-title" id="lb-title"></div><div class="lb-desc" id="lb-desc"></div></div>
                <button class="lb-close" onclick="closeLightbox()"><i class="fas fa-xmark"></i></button>
                <div class="lb-nav">
                    <button class="lb-nav-btn" id="lb-prev" onclick="lbNav(-1)"><i class="fas fa-arrow-left mr-1"></i> Prev</button>
                    <button class="lb-nav-btn" id="lb-next" onclick="lbNav(1)">Next <i class="fas fa-arrow-right ml-1"></i></button>
                </div>
            </div>
        </div>
    </div>
    <footer style="border-top:1px solid color-mix(in srgb,var(--primary) 15%,transparent);padding:2.5rem 2rem;text-align:center;position:relative;z-index:1;">
        <div class="social-links-container" style="justify-content:center;margin-bottom:1.5rem;" id="footer-social"></div>
        <p style="font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.15em;color:#475569;text-transform:uppercase;">&copy; 2026 &nbsp;/&nbsp; <span style="color:var(--primary);" id="footer-name">Kushan A Wickramasinghe</span> &nbsp;/&nbsp; All Rights Reserved</p>
    </footer>
    <script src="site-data.js"></script>
    <script>
        document.getElementById('nav-ham').addEventListener('click',function(){this.classList.toggle('open');document.getElementById('nav-links').classList.toggle('open');});
        let allItems=[],filteredItems=[],currentLbIdx=0;
        window.addEventListener('DOMContentLoaded',()=>{
            const d=SiteData.get();
            document.getElementById('nav-brand-name').textContent=d.profile.nickname||'ASH_X8';
            document.getElementById('footer-name').textContent=d.profile.fullName;
            document.getElementById('footer-social').innerHTML=SiteData._buildSocialLinks(d.social);
            SiteData._buildSplitText(document.getElementById('page-title'),'Designs');
            allItems=d.designs||[];filteredItems=[...allItems];buildFilters();renderGrid(filteredItems);
        });
        function buildFilters(){const cs=new Set();allItems.forEach(i=>{if(i.category)cs.add(i.category);});const bar=document.getElementById('filter-bar');bar.innerHTML='<button class="filter-btn active" onclick="filterDesigns(\'all\',this)">All</button>';cs.forEach(c=>{const b=document.createElement('button');b.className='filter-btn';b.onclick=function(){filterDesigns(c,this);};b.textContent=c;bar.appendChild(b);});}
        function filterDesigns(f,btn){document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');filteredItems=f==='all'?[...allItems]:allItems.filter(i=>i.category===f);renderGrid(filteredItems);}
        function renderGrid(items){const grid=document.getElementById('designs-grid');if(!items.length){grid.innerHTML='<div class="empty-state"><div class="empty-icon"><i class="fas fa-palette"></i></div><h3>No Designs Yet</h3><p>// Add design projects through Admin → Designs tab.</p></div>';return;}grid.innerHTML=items.map(item=>`<div class="design-card reveal-hidden" onclick="openLightbox(${allItems.indexOf(item)})"><div class="design-img-wrap">${item.imageUrl?`<img src="${item.imageUrl}" alt="${item.title}" loading="lazy">`:`<div class="design-ph"><i class="fas fa-palette"></i></div>`}</div><div class="design-info"><div class="design-cat">${item.category||'Design'} &nbsp;//&nbsp; ${item.date}</div><div class="design-title">${item.title}</div><div class="design-desc">${item.description||''}</div></div></div>`).join('');const ob=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('revealed');ob.unobserve(e.target);}});},{threshold:.08});document.querySelectorAll('.reveal-hidden').forEach(el=>ob.observe(el));}
        function openLightbox(idx){currentLbIdx=idx;updateLightbox(idx);document.getElementById('lightbox').classList.add('open');document.body.style.overflow='hidden';}
        function updateLightbox(idx){const item=allItems[idx];if(!item)return;document.getElementById('lb-img').src=item.imageUrl||'';document.getElementById('lb-cat').textContent=item.category||'Design';document.getElementById('lb-title').textContent=item.title;document.getElementById('lb-desc').textContent=item.description||'';document.getElementById('lb-prev').disabled=idx===0;document.getElementById('lb-next').disabled=idx===allItems.length-1;}
        function lbNav(dir){const n=currentLbIdx+dir;if(n>=0&&n<allItems.length){currentLbIdx=n;updateLightbox(n);}}
        function closeLightbox(e){if(!e||e.target===document.getElementById('lightbox')||e.target.closest('.lb-close')){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}}
        document.addEventListener('keydown',e=>{if(!document.getElementById('lightbox').classList.contains('open'))return;if(e.key==='Escape')closeLightbox();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});
    </script>
</body>
</html>
