<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography | ASH_X8 Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
    <style>
        body { background:linear-gradient(135deg,#030d1a 0%,#071428 50%,#050e24 100%); background-attachment:fixed; color:#f0f8ff; }

        .page-hero { padding:8rem 2rem 3rem; text-align:center; position:relative; overflow:hidden; }
        .page-hero::before { content:''; position:absolute; width:700px; height:400px; background:radial-gradient(ellipse,rgba(14,165,233,.07) 0%,transparent 70%); top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
        .page-eyebrow { font-family:'JetBrains Mono',monospace; font-size:.72rem; letter-spacing:.3em; text-transform:uppercase; color:#06b6d4; margin-bottom:1.2rem; opacity:0; animation:fadeInUp .6s ease-out .2s forwards; display:block; }
        .page-title { font-family:'Orbitron',sans-serif; font-size:clamp(2.2rem,6vw,4rem); font-weight:900; letter-spacing:.06em; text-transform:uppercase; background:linear-gradient(135deg,#0ea5e9,#06b6d4,#38bdf8); background-size:200% 200%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:textGlitch 5s ease-in-out infinite,gradientFlow 6s ease infinite; margin-bottom:1rem; }
        .page-sub { font-family:'Rajdhani',sans-serif; font-size:1.1rem; letter-spacing:.15em; text-transform:uppercase; color:#64748b; opacity:0; animation:fadeInUp .6s ease-out .5s forwards; }

        /* Filters */
        .filter-bar { display:flex; gap:.6rem; flex-wrap:wrap; justify-content:center; margin-bottom:3rem; }
        .filter-btn { padding:.45rem 1.1rem; background:rgba(14,165,233,.08); border:1.5px solid rgba(14,165,233,.2); border-radius:2rem; font-family:'JetBrains Mono',monospace; font-size:.65rem; letter-spacing:.12em; text-transform:uppercase; color:#64748b; cursor:pointer; transition:all .3s cubic-bezier(.34,1.56,.64,1); }
        .filter-btn:hover { background:rgba(14,165,233,.15); border-color:rgba(14,165,233,.45); color:#0ea5e9; transform:translateY(-2px); }
        .filter-btn.active { background:linear-gradient(135deg,#0ea5e9,#06b6d4); border-color:#0ea5e9; color:#fff; font-weight:700; box-shadow:0 0 20px rgba(14,165,233,.4); }

        /* Grid */
        .portfolio-grid { columns:3; column-gap:1.2rem; max-width:1300px; margin:0 auto; padding:0 2rem 5rem; }
        @media(max-width:1024px) { .portfolio-grid { columns:2; } }
        @media(max-width:600px)  { .portfolio-grid { columns:1; } }

        .portfolio-item { break-inside:avoid; margin-bottom:1.2rem; position:relative; border-radius:1rem; overflow:hidden; cursor:pointer; border:1.5px solid rgba(14,165,233,.12); transition:all .4s cubic-bezier(.34,1.56,.64,1); }
        .portfolio-item:hover { border-color:rgba(14,165,233,.5); box-shadow:0 0 35px rgba(14,165,233,.25),0 20px 60px rgba(0,0,0,.4); transform:scale(1.02); }
        .portfolio-item img { width:100%; display:block; object-fit:cover; }
        .portfolio-item-overlay { position:absolute; bottom:0; left:0; right:0; padding:1.5rem; background:linear-gradient(transparent,rgba(3,13,26,.95)); transform:translateY(100%); transition:transform .4s cubic-bezier(.34,1.56,.64,1); }
        .portfolio-item:hover .portfolio-item-overlay { transform:translateY(0); }
        .item-title { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:1.1rem; letter-spacing:.06em; text-transform:uppercase; color:#fff; margin-bottom:.3rem; }
        .item-date  { font-family:'JetBrains Mono',monospace; font-size:.62rem; letter-spacing:.12em; color:#06b6d4; margin-bottom:.5rem; }
        .item-desc  { font-family:'Plus Jakarta Sans',sans-serif; font-size:.82rem; color:#94a3b8; line-height:1.5; }
        .item-tags  { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.7rem; }
        .item-tag   { padding:.2rem .6rem; background:rgba(14,165,233,.15); border:1px solid rgba(14,165,233,.25); border-radius:2rem; font-family:'JetBrains Mono',monospace; font-size:.58rem; letter-spacing:.08em; text-transform:uppercase; color:#0ea5e9; }

        /* Empty State */
        .empty-state { text-align:center; padding:5rem 2rem; max-width:500px; margin:0 auto; }
        .empty-state .empty-icon { font-size:4rem; color:rgba(14,165,233,.2); margin-bottom:1.5rem; }
        .empty-state h3 { font-family:'Rajdhani',sans-serif; font-size:1.5rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#0ea5e9; margin-bottom:.8rem; }
        .empty-state p { font-family:'JetBrains Mono',monospace; font-size:.72rem; letter-spacing:.1em; color:#4a5568; line-height:1.7; }

        /* Lightbox */
        .lightbox { display:none; position:fixed; inset:0; z-index:9000; background:rgba(3,13,26,.97); backdrop-filter:blur(20px); align-items:center; justify-content:center; padding:2rem; }
        .lightbox.open { display:flex; animation:fadeInScale .3s ease-out; }
        .lb-content { max-width:900px; width:100%; position:relative; }
        .lb-img-wrap { border-radius:1rem; overflow:hidden; border:1.5px solid rgba(14,165,233,.25); box-shadow:0 0 60px rgba(14,165,233,.2); }
        .lb-img-wrap img { width:100%; max-height:70vh; object-fit:contain; background:#040e20; }
        .lb-info { padding:1.5rem 0 0; }
        .lb-title { font-family:'Orbitron',sans-serif; font-size:1.2rem; font-weight:900; letter-spacing:.06em; text-transform:uppercase; background:linear-gradient(135deg,#0ea5e9,#06b6d4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:.4rem; }
        .lb-date  { font-family:'JetBrains Mono',monospace; font-size:.65rem; letter-spacing:.12em; color:#06b6d4; margin-bottom:.6rem; }
        .lb-desc  { font-family:'Plus Jakarta Sans',sans-serif; color:#94a3b8; font-size:.9rem; line-height:1.7; }
        .lb-close { position:absolute; top:-1rem; right:-1rem; width:40px; height:40px; border-radius:50%; background:rgba(14,165,233,.15); border:1.5px solid rgba(14,165,233,.3); color:#0ea5e9; font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .3s; }
        .lb-close:hover { background:rgba(14,165,233,.3); transform:rotate(90deg) scale(1.1); }
        .lb-nav { display:flex; gap:1rem; margin-top:1rem; }
        .lb-nav-btn { flex:1; padding:.7rem; background:rgba(14,165,233,.08); border:1.5px solid rgba(14,165,233,.2); border-radius:.6rem; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.8rem; letter-spacing:.1em; text-transform:uppercase; color:#0ea5e9; cursor:pointer; transition:all .3s; }
        .lb-nav-btn:hover { background:rgba(14,165,233,.15); border-color:#0ea5e9; box-shadow:0 0 20px rgba(14,165,233,.3); }
        .lb-nav-btn:disabled { opacity:.2; cursor:not-allowed; transform:none; box-shadow:none; }

        /* Social links */
        .social-links-container { display:flex; gap:.7rem; flex-wrap:wrap; }
        .social-link-btn { display:inline-flex; align-items:center; justify-content:center; width:42px; height:42px; border-radius:.6rem; border:1.5px solid rgba(255,255,255,.08); background:rgba(255,255,255,.04); color:var(--sc,#fff); font-size:1.1rem; text-decoration:none; transition:all .3s cubic-bezier(.34,1.56,.64,1); }
        .social-link-btn:hover { background:rgba(255,255,255,.08); border-color:var(--sc,#0ea5e9); transform:translateY(-4px) scale(1.1); }
    </style>
</head>
<body>
    <!-- Nav -->
    <nav class="fixed top-4 left-1/2 -translate-x-1/2 w-[95%] max-w-7xl z-50 bg-black/20 rounded-xl border border-sky-500/20 backdrop-blur-xl shadow-2xl">
        <div class="px-5 py-3 flex items-center justify-between gap-2">
            <a href="/" id="nav-brand" style="font-family:'Orbitron',sans-serif;font-weight:900;font-size:1rem;letter-spacing:.12em;text-transform:uppercase;background:linear-gradient(135deg,#0ea5e9,#06b6d4,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:textGlitch 5s infinite;white-space:nowrap;">ASH_X8</a>
            <div class="flex gap-1 overflow-x-auto">
                <a href="/" class="nav-link px-3 py-2 text-xs font-bold tracking-widest uppercase rounded-lg text-gray-400 hover:text-sky-400 hover:bg-sky-500/10 transition-all whitespace-nowrap" style="font-family:'Rajdhani',sans-serif;">Home</a>
                <a href="/about.html" class="nav-link px-3 py-2 text-xs font-bold tracking-widest uppercase rounded-lg text-gray-400 hover:text-sky-400 hover:bg-sky-500/10 transition-all whitespace-nowrap" style="font-family:'Rajdhani',sans-serif;">About</a>
                <a href="/photography.html" class="nav-link px-3 py-2 text-xs font-bold tracking-widest uppercase rounded-lg text-sky-400 bg-sky-500/10 border border-sky-500/20 whitespace-nowrap" style="font-family:'Rajdhani',sans-serif;">Photography</a>
                <a href="/designs.html" class="nav-link px-3 py-2 text-xs font-bold tracking-widest uppercase rounded-lg text-gray-400 hover:text-sky-400 hover:bg-sky-500/10 transition-all whitespace-nowrap" style="font-family:'Rajdhani',sans-serif;">Designs</a>
                <a href="/projects.html" class="nav-link px-3 py-2 text-xs font-bold tracking-widest uppercase rounded-lg text-gray-400 hover:text-sky-400 hover:bg-sky-500/10 transition-all whitespace-nowrap" style="font-family:'Rajdhani',sans-serif;">Services</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="page-hero">
        <span class="page-eyebrow">// Visual Portfolio &nbsp;◈&nbsp; Photography</span>
        <h1 class="page-title" id="page-title"></h1>
        <p class="page-sub">Moments Captured &nbsp;·&nbsp; Stories Told &nbsp;·&nbsp; Light Mastered</p>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar px-4" id="filter-bar" style="max-width:1300px;margin:0 auto 2rem;">
        <button class="filter-btn active" data-filter="all" onclick="filterPortfolio('all', this)">All</button>
    </div>

    <!-- Grid -->
    <div class="portfolio-grid" id="portfolio-grid">
        <div class="empty-state" style="column-span:all;">
            <div class="empty-icon"><i class="fas fa-camera"></i></div>
            <h3>No Photos Yet</h3>
            <p>// Add photography samples through the Admin panel under the Photography tab.</p>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <div class="lb-content">
            <button class="lb-close" onclick="closeLightbox()"><i class="fas fa-xmark"></i></button>
            <div class="lb-img-wrap">
                <img id="lb-img" src="" alt="">
            </div>
            <div class="lb-info">
                <div class="lb-title" id="lb-title"></div>
                <div class="lb-date" id="lb-date"></div>
                <div class="lb-desc" id="lb-desc"></div>
                <div class="item-tags" id="lb-tags"></div>
                <div class="lb-nav">
                    <button class="lb-nav-btn" id="lb-prev" onclick="lbNav(-1)"><i class="fas fa-arrow-left mr-1"></i> Prev</button>
                    <button class="lb-nav-btn" id="lb-next" onclick="lbNav(1)">Next <i class="fas fa-arrow-right ml-1"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="border-t py-10 px-4 text-center relative z-1" style="border-color:rgba(14,165,233,.15);">
        <div class="social-links-container" style="justify-content:center;margin-bottom:1.5rem;" id="footer-social"></div>
        <p style="font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.15em;color:#475569;text-transform:uppercase;">
            &copy; 2026 &nbsp;/&nbsp; <span style="color:#0ea5e9;" id="footer-name">Kushan A Wickramasinghe</span> &nbsp;/&nbsp; All Rights Reserved
        </p>
    </footer>

    <script src="site-data.js"></script>
    <script>
        let allItems = [];
        let filteredItems = [];
        let currentLbIdx = 0;

        window.addEventListener('DOMContentLoaded', () => {
            const d = SiteData.get();
            document.getElementById('nav-brand').textContent = d.profile.nickname || 'ASH_X8';
            document.getElementById('footer-name').textContent = d.profile.fullName;
            document.getElementById('footer-social').innerHTML = SiteData._buildSocialLinks(d.social);

            SiteData._buildSplitText(document.getElementById('page-title'), 'Photography');

            allItems = d.photography || [];
            filteredItems = [...allItems];

            buildFilters();
            renderGrid(filteredItems);

            // Scroll reveal
            const ob = new IntersectionObserver(entries => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('revealed'); ob.unobserve(e.target); } });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal-hidden').forEach(el => ob.observe(el));
        });

        function buildFilters() {
            const tagsSet = new Set();
            allItems.forEach(item => (item.tags || []).forEach(t => tagsSet.add(t)));
            const bar = document.getElementById('filter-bar');
            bar.innerHTML = '<button class="filter-btn active" data-filter="all" onclick="filterPortfolio(\'all\',this)">All</button>';
            tagsSet.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.filter = tag;
                btn.textContent = tag;
                btn.onclick = function() { filterPortfolio(tag, this); };
                bar.appendChild(btn);
            });
        }

        function filterPortfolio(filter, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            filteredItems = filter === 'all' ? [...allItems] : allItems.filter(i => (i.tags || []).includes(filter));
            renderGrid(filteredItems);
        }

        function renderGrid(items) {
            const grid = document.getElementById('portfolio-grid');
            if (!items.length) {
                grid.innerHTML = `<div class="empty-state" style="column-span:all;"><div class="empty-icon"><i class="fas fa-camera"></i></div><h3>No Photos Yet</h3><p>// Add photography samples through the Admin panel → Photography tab.</p></div>`;
                return;
            }
            grid.innerHTML = items.map((item, i) => `
                <div class="portfolio-item reveal-hidden" onclick="openLightbox(${allItems.indexOf(item)})">
                    <img src="${item.imageUrl}" alt="${item.title}" loading="lazy">
                    <div class="portfolio-item-overlay">
                        <div class="item-title">${item.title}</div>
                        <div class="item-date">// ${item.date}</div>
                        <div class="item-desc">${item.description || ''}</div>
                        ${(item.tags||[]).length ? `<div class="item-tags">${(item.tags||[]).map(t=>`<span class="item-tag">${t}</span>`).join('')}</div>` : ''}
                    </div>
                </div>
            `).join('');

            const ob = new IntersectionObserver(entries => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('revealed'); ob.unobserve(e.target); } });
            }, { threshold: 0.08 });
            document.querySelectorAll('.reveal-hidden').forEach(el => ob.observe(el));
        }

        function openLightbox(idx) {
            currentLbIdx = idx;
            updateLightbox(idx);
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function updateLightbox(idx) {
            const item = allItems[idx];
            if (!item) return;
            document.getElementById('lb-img').src   = item.imageUrl;
            document.getElementById('lb-title').textContent = item.title;
            document.getElementById('lb-date').textContent  = '// ' + item.date;
            document.getElementById('lb-desc').textContent  = item.description || '';
            document.getElementById('lb-tags').innerHTML    = (item.tags||[]).map(t=>`<span class="item-tag">${t}</span>`).join('');
            document.getElementById('lb-prev').disabled = idx === 0;
            document.getElementById('lb-next').disabled = idx === allItems.length - 1;
        }

        function lbNav(dir) {
            const newIdx = currentLbIdx + dir;
            if (newIdx >= 0 && newIdx < allItems.length) {
                currentLbIdx = newIdx;
                updateLightbox(newIdx);
            }
        }

        function closeLightbox(e) {
            if (!e || e.target === document.getElementById('lightbox') || e.target.classList.contains('lb-close') || e.target.closest('.lb-close')) {
                document.getElementById('lightbox').classList.remove('open');
                document.body.style.overflow = '';
            }
        }

        document.addEventListener('keydown', e => {
            if (!document.getElementById('lightbox').classList.contains('open')) return;
            if (e.key === 'Escape')      closeLightbox();
            if (e.key === 'ArrowLeft')   lbNav(-1);
            if (e.key === 'ArrowRight')  lbNav(1);
        });
    </script>
</body>
</html>
