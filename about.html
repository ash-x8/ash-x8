<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | ASH_X8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#050505] text-white antialiased overflow-x-hidden">

    <div class="animation-bg-wrapper">
        <div class="focus-ring lens-container"></div>
    </div>

    <header class="fixed top-4 left-1/2 -translate-x-1/2 w-[92%] max-w-7xl z-50 bg-black/10 rounded-3xl border border-white/[0.05] backdrop-blur-xl shadow-2xl">
        <div class="px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="text-xl font-black tracking-widest uppercase font-['Orbitron'] text-cyan-400">ASH_X8</a>
            <nav id="desktop-menu" class="hidden md:flex items-center space-x-6 bg-white/[0.02] px-6 py-2 rounded-full border border-white/[0.05]"></nav>
            <button onclick="toggleMenu()" class="md:hidden text-white text-xl"><i class="fa-solid fa-bars-staggered"></i></button>
        </div>
        <div id="mobile-drawer" class="hidden fixed top-24 left-0 w-full bg-black/95 backdrop-blur-2xl p-6 flex flex-col space-y-4 rounded-b-3xl"></div>
    </header>

    <section class="min-h-screen pt-36 pb-20 px-6 max-w-6xl mx-auto flex flex-col justify-center relative z-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-12 items-start">
            
            <div class="bg-white/[0.01] border border-white/[0.08] p-6 rounded-[2.5rem] backdrop-blur-xl text-center shadow-2xl">
                <div class="w-44 h-44 mx-auto rounded-full overflow-hidden border-2 border-cyan-400/40 p-1.5 mb-6">
                    <img id="profile-avatar" src="" alt="Avatar" class="w-full h-full object-cover rounded-full">
                </div>
                <h2 id="profile-name" class="text-xl font-bold tracking-wide"></h2>
                <p id="profile-nickname" class="text-cyan-400 text-[10px] tracking-widest uppercase font-['Orbitron'] mt-1 mb-6"></p>
                
                <div class="border-t border-white/[0.05] pt-6 text-left">
                    <h4 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-3 font-['Orbitron']">Hobbies & Passions</h4>
                    <div id="profile-hobbies" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

            <div class="md:col-span-2 space-y-8">
                <div class="bg-white/[0.01] border border-white/[0.05] p-8 md:p-10 rounded-[2.5rem] backdrop-blur-xl shadow-2xl">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-cyan-400 mb-4 font-['Orbitron']">About Me</h3>
                    <p id="profile-about" class="text-base font-light text-gray-300 leading-relaxed mb-8"></p>
                    
                    <h4 class="text-xs font-bold uppercase tracking-widest text-purple-400 mb-4 font-['Orbitron']">Roles & Leadership</h4>
                    <div id="profile-roles" class="space-y-4"></div>
                </div>

                <div class="bg-white/[0.01] border border-white/[0.05] p-6 rounded-3xl backdrop-blur-xl">
                    <h4 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-4 font-['Orbitron']"><i class="fa-solid fa-wand-magic-sparkles text-cyan-400 mr-2"></i> Creative Tools Stack</h4>
                    <div id="profile-tools" class="flex flex-wrap gap-2.5"></div>
                </div>
            </div>

        </div>
    </section>

    <script src="config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCnXtXpynpkN5SOi-l8zSuaeuLFUByQVhQ",
            authDomain: "ash-x8.firebaseapp.com",
            projectId: "ash-x8"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.addEventListener("DOMContentLoaded", async () => {
            setupNav();
            loadStaticProfile();

            try {
                const snap = await getDoc(doc(db, "portfolio", "liveData"));
                if(snap.exists()) applyLiveProfile(snap.data());
            } catch(e) {}
        });

        function setupNav() {
            const desk = document.getElementById("desktop-menu");
            const mob = document.getElementById("mobile-drawer");
            window.SITE_CONFIG.nav.links.forEach(l => {
                const act = l.href === "profile.html" ? "text-cyan-400 font-bold" : "text-gray-400";
                desk.innerHTML += `<a href="${l.href}" class="text-xs uppercase tracking-widest font-medium transition-all ${act}">${l.text}</a>`;
                mob.innerHTML += `<a href="${l.href}" class="text-lg ${act}">${l.text}</a>`;
            });
        }

        function loadStaticProfile() {
            const p = window.SITE_CONFIG.personalProfile;
            document.getElementById("profile-avatar").src = p.avatar;
            document.getElementById("profile-name").innerText = p.fullName;
            document.getElementById("profile-nickname").innerText = `CODE // ${p.nickname}`;
            document.getElementById("profile-about").innerText = p.aboutMe;
            
            p.hobbies.forEach(h => {
                document.getElementById("profile-hobbies").innerHTML += `<span class="bg-white/5 border border-white/10 text-gray-300 px-3 py-1 rounded-full text-xs font-medium">${h}</span>`;
            });
            p.roles.forEach(r => {
                document.getElementById("profile-roles").innerHTML += `<div class="flex items-center gap-3 text-sm text-gray-400"><i class="fa-regular fa-compass text-cyan-400"></i><span>${r}</span></div>`;
            });
            p.tools.forEach(t => {
                document.getElementById("profile-tools").innerHTML += `<span class="bg-cyan-500/5 border border-cyan-500/10 px-3 py-1.5 rounded-xl text-xs text-gray-300">${t}</span>`;
            });
        }

        function applyLiveProfile(d) {
            if(d.profileAvatar) document.getElementById("profile-avatar").src = d.profileAvatar;
            if(d.profileName) document.getElementById("profile-name").innerText = d.profileName;
            if(d.profileNickname) document.getElementById("profile-nickname").innerText = `CODE // ${d.profileNickname}`;
            if(d.profileAbout) document.getElementById("profile-about").innerText = d.profileAbout;
        }

        window.toggleMenu = () => document.getElementById("mobile-drawer").classList.toggle("hidden");
    </script>
</body>
</html>
